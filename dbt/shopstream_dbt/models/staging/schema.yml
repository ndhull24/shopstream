version: 2

models:
  - name: stg_customers
    description: "Cleaned customers table"
    columns:
      - name: customer_id
        description: "Primary key"
        tests:
          - unique
          - not_null
      - name: email
        tests:
          - not_null
      - name: segment
        tests:
          - accepted_values:
              values: ['VIP', 'Regular', 'At-Risk', 'New']

  - name: stg_orders
    description: "Cleaned orders table"
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: status
        tests:
          - accepted_values:
              values: ['completed', 'pending', 'cancelled', 'refunded']

  - name: stg_products
    description: "Cleaned products table"
    columns:
      - name: product_id
        tests:
          - unique
          - not_null

  - name: stg_order_items
    description: "Cleaned order items table"
    columns:
      - name: item_id
        tests:
          - unique
          - not_null